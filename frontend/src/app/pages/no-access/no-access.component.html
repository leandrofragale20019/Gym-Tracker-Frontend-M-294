<div class="no-access-page">
  @if (!oauthService.hasValidAccessToken()) {
    <app-login></app-login>
  } @else {
    <div class="no-access-card">
      <div class="icon">⛔</div>
      <h2>Kein Zugriff</h2>
      <p>Sie haben keine Berechtigung für diese Seite.</p>
      <a href="/dashboard" class="btn-back">Zum Dashboard</a>
    </div>
  }
</div>
